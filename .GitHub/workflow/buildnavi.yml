name: Build Project.EXE Standalone
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Standalone Binary
        run: |
          pyinstaller --onefile --name navi-core navi_runtime.py

      - name: Upload Downloadable Package
        uses: actions/upload-artifact@v4
        with:
          name: navi-linux-executable
          path: dist/navi-core
          
